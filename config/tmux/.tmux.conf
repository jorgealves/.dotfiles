
# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev

# -- Basic Settings ------------------------------------------
set -g prefix C-a
set -g escape-time 10
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g set-clipboard on

# -- Status Bar ---------------------------------------------
set -g status-position bottom
set -g status-interval 3
set -g status-left "#{?client_prefix,#[bg=red]PREFIX#[default],} 📺 #{session_name} "
set -g status-left-length 30
set -g status-right "🔋 #{battery_percentage}  🎛️  #{cpu_percentage} 🧠 #{ram_percentage} 🗓️ %Y-%m-%d 🕣 %H:%M"
set -g status-right-length 80

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pany_current_command}"

set -g window-status-format " #I:#W#{?window_flags,#{window_flags},} "
set -g window-status-current-format " #[bg=blue]#I:#W#{?window_flags,#{window_flags},}#[default] "

set -g status-style bg=default

set -g renumber-windows on
set -g automatic-rename on


# -- Key Bindings -------------------------------------------

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# -- Plugins -----------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# CPU Monitoring
set -g @plugin 'tmux-plugins/tmux-cpu'

# Battery Monitoring
set -g @plugin 'tmux-plugins/tmux-battery'


# Other plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
